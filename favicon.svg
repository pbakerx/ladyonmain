<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Lady on Main — simple speakeasy house -->
  <rect width="64" height="64" rx="12" fill="#14100c"/>
  <!-- roof -->
  <path d="M10 34 L32 12 L54 34" fill="none" stroke="#c9a35c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- chimney -->
  <rect x="42" y="15" width="6" height="10" rx="1" fill="#c9a35c"/>
  <!-- body -->
  <path d="M16 32 L16 52 L48 52 L48 32" fill="none" stroke="#c9a35c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- glowing window -->
  <rect x="27" y="37" width="10" height="15" rx="2" fill="#f0b95e"/>
  <circle cx="32" cy="42" r="9" fill="#f0b95e" opacity="0.28"/>
</svg>
